name = "echoes-social"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "echoes-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# R2 is not yet connected (billing/card pending) — the app runs in test
# mode without it, storing short audio clips directly in D1 instead.
# Uncomment these three lines once R2 is activated, then redeploy:
# [[r2_buckets]]
# binding = "AUDIO_BUCKET"
# bucket_name = "echoes-audio"

[vars]
ENVIRONMENT = "test"
CLERK_JWKS_URL = "https://REPLACE_WITH_YOUR_CLERK_DOMAIN/.well-known/jwks.json"
# R2_PUBLIC_BASE_URL is not needed until R2 is connected — uncomment and set
# this once you activate R2:
# R2_PUBLIC_BASE_URL = "https://REPLACE_WITH_YOUR_R2_PUBLIC_DOMAIN"
